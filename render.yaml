services:
  - type: web
    name: gerador-arte-salesjobs
    runtime: node
    buildCommand: npm install && npx playwright install chromium --with-deps && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
